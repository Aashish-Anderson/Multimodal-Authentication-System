<!DOCTYPE html>
<html>
<head>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>

        /* NAVBAR */
        .navbar{
            display:flex;
            gap:35px;
            justify-content:flex-end;
            padding:20px;
            position:relative;
            z-index:5;
        }
        .navbar a{
            color:white;
            font-weight:600;
            text-decoration:none;
        }
        .navbar a:hover{
            color:#00ffc6;
        }

        /* BACKGROUND VIDEO */
        #bg-video{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            object-fit:cover;
            z-index:-2;
            opacity:0.28;
        }

        /* DARK LAYER for readability */
        #bg-overlay{
            position:fixed;
            width:100%;
            height:100%;
            top:0;
            left:0;
            background:black;
            opacity:0.45;
            z-index:-1;
        }

    </style>

</head>

<body>

<!-- VIDEO BACKGROUND -->
<video id="bg-video" autoplay muted loop playsinline>
    <source src="{{ url_for('static', filename='video/background.mp4') }}" type="video/mp4">
</video>

<div id="bg-overlay"></div>

<header class="app-header">

    <nav class="navbar">

        <a href="{{ url_for('home') }}">Dashboard</a>

        <a href="{{ url_for('authenticate') }}">Authenticate</a>

        <a href="{{ url_for('admin_login') }}">Admin</a>

    </nav>

</header>


<main class="app-main">

{% block content %}
{% endblock %}

</main>

</body>
</html>
