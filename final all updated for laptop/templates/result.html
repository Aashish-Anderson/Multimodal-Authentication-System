{% extends "base.html" %}
{% block content %}

<style>

.result-container{
    max-width:900px;
    margin:auto;
    margin-top:30px;
    padding:25px;
    
    background:rgba(10,15,18,0.65);
    border:1px solid rgba(34,197,94,0.30);
    border-radius:18px;

    backdrop-filter:blur(16px);
    box-shadow:0 0 28px rgba(34,197,94,0.25);
}

.section-title{
    font-size:22px;
    font-weight:600;
    margin-bottom:15px;
    color:#4ade80;
}

.terminal-box{
    background:#000;
    border-radius:14px;
    border:1px solid rgba(34,197,94,0.45);
    padding:16px;
    font-family:Consolas, monospace;
    font-size:14px;
    line-height:1.48;
    white-space:pre-wrap;
    max-height:420px;
    overflow-y:auto;
    color:#d1fae5;
}

.btn-row{
    margin-top:22px;
    display:flex;
    gap:14px;
}

.copy-btn{
    padding:7px 14px;
    border-radius:999px;
    font-size:13px;
    cursor:pointer;
    background:#1a1f1b;
    border:1px solid #2dd46e;
    color:#2dd46e;
}
.copy-btn:hover{
    background:#2dd46e;
    color:#001007;
}
</style>


<div class="result-container">

    <div class="section-title"> Authentication Output</div>

    <div id="terminal" class="terminal-box">
        {{ output }}
    </div>

    <div class="btn-row">
        <button class="copy-btn" onclick="copyOutput()">Copy</button>

        <a href="{{ url_for('authenticate') }}" class="btn primary">Authenticate Again</a>

        <a href="{{ url_for('home') }}" class="btn secondary">Dashboard</a>
    </div>

</div>


<script>
function copyOutput(){
    let txt = document.getElementById("terminal").innerText;
    navigator.clipboard.writeText(txt);
    alert("Copied to clipboard");
}
</script>

{% endblock %}
