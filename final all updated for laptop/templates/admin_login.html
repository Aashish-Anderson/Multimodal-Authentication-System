{% extends "base.html" %}
{% block content %}

<style>

.admin-box{
    max-width:420px;
    margin:auto;
    margin-top:50px;

    padding:30px;
    border-radius:18px;

    background:rgba(8,14,18,0.80);
    border:1px solid rgba(34,197,94,0.35);
    backdrop-filter:blur(14px);

    box-shadow:0 0 35px rgba(34,197,94,0.25);

    animation:fadeIn .35s ease-out;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(14px);}
    to{opacity:1; transform:translateY(0);}
}

.admin-title{
    text-align:center;
    font-size:28px;
    font-weight:600;
    margin-bottom:8px;
}

.admin-sub{
    text-align:center;
    font-size:13px;
    color:#8ca3af;
    margin-bottom:24px;
}

.inp{
    width:100%;
    padding:10px 14px;

    background:rgba(0,0,0,.55);
    border:1px solid rgba(120,160,120,.35);
    border-radius:10px;
    color:#e7ffee;
    font-size:15px;

    margin-bottom:14px;
}

.inp:focus{
    border-color:#22c55e;
    box-shadow:0 0 10px rgba(34,197,94,.45);
    outline:none;
}

.error-box{
    background:rgba(255,0,0,0.18);
    border:1px solid rgba(255,0,0,0.65);
    padding:8px 10px;
    border-radius:8px;
    font-size:13px;
    margin-bottom:14px;
    color:#ff9c9c;
}

.btn-row{
    margin-top:10px;
    text-align:center;
}

</style>


<div class="admin-box">

    <div class="admin-title">Admin Login</div>
    <div class="admin-sub">Secure panel access</div>

    <form method="POST">

        <label>Username</label>
        <input class="inp" name="username" autocomplete="off">

        <label>Password</label>
        <input class="inp" type="password" name="password">

        {% if error %}
        <div class="error-box">{{error}}</div>
        {% endif %}

        <div class="btn-row">
            <button class="btn primary">Login</button>
        </div>

    </form>

</div>

{% endblock %}
