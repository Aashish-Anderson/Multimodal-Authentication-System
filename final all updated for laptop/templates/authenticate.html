{% extends "base.html" %}
{% block content %}

<style>

.auth-box{
    max-width:420px;
    margin:auto;
    margin-top:45px;
    padding:28px;
    border-radius:18px;

    background:rgba(8,14,18,0.78);
    border:1px solid rgba(34,197,94,0.3);
    box-shadow:0 0 30px rgba(34,197,94,0.25);

    backdrop-filter:blur(12px);

    animation:fadeIn .45s ease-out;
}

@keyframes fadeIn{
    from{ opacity:0; transform:translateY(12px); }
    to{ opacity:1; transform:translateY(0px); }
}

.auth-box h1{
    font-size:26px;
    font-weight:600;
    margin-bottom:8px;
    text-align:center;
}

.auth-box p.sub{
    font-size:13px;
    color:#8ca3af;
    text-align:center;
    margin-bottom:20px;
}

.auth-box label{
    font-size:14px;
}

.auth-input{
    width:100%;
    padding:10px 14px;
    margin:8px 0 14px;

    border-radius:10px;
    border:1px solid rgba(120,160,120,0.35);

    background:rgba(0,0,0,.55);
    color:#f8fff5;
    font-size:15px;
}
.auth-input:focus{
    border-color:#22c55e;
    box-shadow:0 0 10px rgba(34,197,94,.45);
    outline:none;
}

.hint{
    font-size:13px;
    color:#96abb6;
    line-height:1.45;
    border-left:4px solid #22c55e;
    padding-left:10px;
    margin-bottom:14px;
    opacity:.85;
}

.buttons{
    margin-top:10px;
    display:flex;
    justify-content:center;
    gap:12px;
}

</style>

<div class="auth-box">

    <h1 class="glow">Authenticate User</h1>
    <p class="sub">Secure Face + Voice Verification</p>

    <form method="POST">

        <label>User ID</label>
        <input class="auth-input" name="user_id" placeholder="e.g. 101" required>

        <div class="hint">
            • Webcam will open for face scan<br>
            • If face matches → passphrase voice check<br>
            • Results show instantly
        </div>

        <div class="buttons">
            <button class="btn primary" type="submit">Start Authentication</button>
            <a href="{{ url_for('home') }}" class="btn secondary">Cancel</a>
        </div>

    </form>

</div>

{% endblock %}
