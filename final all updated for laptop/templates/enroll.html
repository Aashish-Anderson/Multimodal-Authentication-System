{% extends "base.html" %}
{% block content %}

<style>

.enroll-box{
    max-width:450px;
    margin:auto;
    margin-top:45px;

    padding:28px;
    border-radius:18px;

    background:rgba(8,14,18,0.80);
    border:1px solid rgba(34,197,94,0.35);
    box-shadow:0 0 35px rgba(34,197,94,0.28);

    backdrop-filter:blur(14px);

    animation:fadeIn .45s ease-out;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(14px);}
    to{opacity:1; transform:translateY(0);}
}

.en-title{
    text-align:center;
    font-size:27px;
    font-weight:600;
    margin-bottom:8px;
}

.en-sub{
    text-align:center;
    font-size:13px;
    color:#8ca3af;
    margin-bottom:22px;
}

.en-label{
    font-size:14px;
}

.en-input{
    width:100%;
    padding:11px 14px;
    margin:8px 0 16px;

    background:rgba(0,0,0,.55);
    border:1px solid rgba(120,160,120,.35);
    border-radius:10px;
    color:#e7ffee;
    font-size:15px;
}
.en-input:focus{
    border-color:#22c55e;
    box-shadow:0 0 14px rgba(34,197,94,.4);
    outline:none;
}

.en-hint{
    margin-top:2px;
    font-size:13px;
    color:#94b5c2;
    line-height:1.35;
    border-left:4px solid #22c55e;
    padding-left:12px;
    opacity:.85;
}

.btn-row{
    margin-top:18px;
    display:flex;
    gap:12px;
    justify-content:center;
}

</style>


<div class="enroll-box">

    <div class="en-title">Enroll New User</div>
    <div class="en-sub">System will capture face + voice samples</div>

    <form method="POST">

        <label class="en-label">User ID</label>
        <input class="en-input" name="user_id" placeholder="e.g. 101" required>

        <label class="en-label">User Name</label>
        <input class="en-input" name="user_name" placeholder="e.g. Aashish" required>

        <div class="en-hint">
            • Webcam captures 50 images<br>
            • Then 3 voice samples recorded<br>
            • Speak passphrase clearly
        </div>

        <div class="btn-row">
            <button class="btn primary" type="submit">Start Enrollment</button>
            <a class="btn secondary" href="{{ url_for('home') }}">Cancel</a>
        </div>

    </form>

</div>

{% endblock %}
